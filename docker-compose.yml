# Chek_NVR — chạy app + PostgreSQL bằng Docker Compose.
# Dùng: cp .env.docker.example .env  (điền giá trị)  ->  docker compose up -d --build
# Tạo admin đầu: docker compose exec app python -m scripts.manage_user add \
#                  --username admin --password "..." --role admin

services:
  db:
    image: postgres:18-alpine
    restart: unless-stopped
    env_file: .env
    volumes:
      # postgres:18+ lưu data trong subdir theo major-version -> mount ở
      # /var/lib/postgresql (KHÔNG phải /data, sẽ bị từ chối khởi động ở pg18).
      - pgdata:/var/lib/postgresql
    healthcheck:
      # $$ để biến được đánh giá TRONG container (không phải compose interpolation).
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 12
    # Không map port DB ra host (chỉ app trong mạng compose truy cập).

  app:
    build: .
    restart: unless-stopped
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    ports:
      # CHỈ lắng nghe localhost của host — ra LAN đi qua Caddy (TLS) ở dưới.
      - "127.0.0.1:8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health')\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./tls:/etc/caddy/certs:ro          # cert do scripts/gen_certs.sh tạo
      - caddy_data:/data
      - caddy_config:/config

volumes:
  pgdata:
  caddy_data:
  caddy_config:
