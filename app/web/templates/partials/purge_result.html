{% if error %}
<div class="alert alert-danger py-2 mb-0">
  <i class="bi bi-exclamation-triangle-fill me-1"></i>{{ error }}
</div>
{% elif result %}
<div class="alert alert-success py-2 mb-0">
  <i class="bi bi-check-circle-fill me-1"></i>
  Đã xóa <strong>{{ result.total }}</strong> dòng log từ
  <strong>{{ from_date }}</strong> đến <strong>{{ to_date }}</strong>
  ({{ result.nvr_logs }} log NVR, {{ result.camera_logs }} log camera).
</div>
{% endif %}
