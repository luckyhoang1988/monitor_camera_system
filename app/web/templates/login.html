<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng nhập — Check_NVR</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    body {
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      background: linear-gradient(135deg, #1f2a44 0%, #0d1b2a 100%);
    }
    .login-card { width: 100%; max-width: 390px; border: none; border-radius: 1rem; }
    .brand-badge {
      width: 64px; height: 64px; border-radius: 1rem;
      display: inline-flex; align-items: center; justify-content: center;
      background: linear-gradient(135deg, #0d6efd, #0dcaf0); color: #fff; font-size: 1.9rem;
    }
  </style>
</head>
<body>
  <div class="login-card card shadow-lg">
    <div class="card-body p-4 p-sm-5">
      <div class="text-center mb-4">
        <span class="brand-badge mb-3"><i class="bi bi-camera-video-fill"></i></span>
        <h4 class="fw-bold mb-1">Check_NVR</h4>
        <p class="text-muted small mb-0">Giám sát đầu ghi &amp; camera Hikvision</p>
      </div>
      {% if error %}
      <div class="alert alert-danger py-2 d-flex align-items-center gap-2">
        <i class="bi bi-exclamation-triangle-fill"></i><span>{{ error }}</span>
      </div>
      {% endif %}
      <form method="post" action="/login">
        {% include "partials/_csrf.html" %}
        <input type="hidden" name="next" value="{{ next }}">
        <div class="mb-3">
          <label class="form-label">Tài khoản</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-person"></i></span>
            <input type="text" name="username" class="form-control" autofocus required>
          </div>
        </div>
        <div class="mb-4">
          <label class="form-label">Mật khẩu</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-lock"></i></span>
            <input type="password" name="password" class="form-control" required>
          </div>
        </div>
        <button type="submit" class="btn btn-primary w-100 py-2">
          <i class="bi bi-box-arrow-in-right me-1"></i>Đăng nhập</button>
      </form>
    </div>
  </div>
</body>
</html>
