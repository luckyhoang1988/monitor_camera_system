{% extends "base.html" %}
{% block title %}Tổng quan — Check_NVR{% endblock %}
{% block content %}
<div class="d-flex align-items-center justify-content-between mb-4">
  <div>
    <h3 class="mb-0"><i class="bi bi-speedometer2 me-2 text-primary"></i>Tổng quan hệ thống</h3>
    <p class="text-muted mb-0">Trạng thái đầu ghi &amp; camera toàn hệ thống</p>
  </div>
  <a href="/nvrs" class="btn btn-primary"><i class="bi bi-hdd-stack me-1"></i>Danh sách NVR</a>
</div>

<!-- Tự động làm mới mỗi 30s qua HTMX polling (trạng thái + hiệu ứng nhấp nháy) -->
<div id="dashboard-body" hx-get="/" hx-trigger="every 30s" hx-swap="innerHTML">
  {% include "partials/dashboard_body.html" %}
</div>
{% endblock %}
